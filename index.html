// Fuzzy match a spoken/typed product name against inventory
function matchProduct(input) {
  const q = input.toLowerCase().trim();
  // Try exact-ish match first
  for (const p of PRODUCTS) {
    if (p.name.toLowerCase().includes(q) || q.includes(p.name.toLowerCase())) return p;
  }
  // Try partial keyword match
  for (const p of PRODUCTS) {
    const words = p.name.toLowerCase().split(/\s+/);
    const qWords = q.split(/\s+/);
    const matchCount = qWords.filter(w => words.some(pw => pw.includes(w) || w.includes(pw))).length;
    if (matchCount >= 2 || (qWords.length === 1 && matchCount >= 1)) return p;
  }
  // Fallback: accept unknown product with generated price
  const hash = q.split("").reduce((a,c) => a + c.charCodeAt(0), 0);
  const price = 5 + (hash % 200) + ((hash % 100) / 100);
  return { name: input.trim(), unitPrice: Math.round(price * 100) / 100 };
}

// Parse invoice prompt to extract customer + line items
function parseInvoicePrompt(text) {
  const q = text.toLowerCase();
  let customer = null;
  let items = [];

  // Extract customer: "for <customer name>." or "for <customer name>,"
  const custMatch = text.match(/(?:for|customer|client)\s+([A-Z][^.,\d]*?)(?:\.|,|\s+\d|\s+and\b)/i);
  if (custMatch) customer = custMatch[1].trim();
  if (!customer) {
    const custMatch2 = text.match(/(?:for|customer|client)\s+([A-Z][A-Za-z\s&']+)/i);
    if (custMatch2) customer = custMatch2[1].trim().replace(/\s+(and|with|plus)$/i, "");
  }

  // Extract items: patterns like "25 queen size bed sheets", "18 packs of the 400 pack teabags"
  const itemPatterns = [
    /(\d+)\s+(?:packs?\s+of\s+(?:the\s+)?)?(.+?)(?=\s+and\s+\d|\s*\.\s*$|\s*$)/gi,
  ];

  // Split by "and" or "," to find individual items
  const itemPart = text.replace(/^.*?(?:invoice|for\s+[A-Z][^.,]*?[.,])\s*/i, "");
  const segments = itemPart.split(/\s+and\s+|\s*,\s*/i).filter(s => s.trim());

  for (const seg of segments) {
    const m = seg.trim().match(/^(\d+)\s+(?:packs?\s+of\s+(?:the\s+)?|x\s+)?(.+?)\.?$/i);
    if (m) {
      const qty = parseInt(m[1], 10);
      const product = matchProduct(m[2]);
      items.push({ name: product.name, quantity: qty, unitPrice: product.unitPrice, lineTotal: Math.round(qty * product.unitPrice * 100) / 100 });
    }
  }

  // If no items found, try a simpler split
  if (items.length === 0) {
    const allMatches = [...text.matchAll(/(\d+)\s+(?:packs?\s+of\s+(?:the\s+)?|x\s+)?([a-zA-Z][a-zA-Z\s()]+?)(?=\s+and\s+\d|\s*\.\s*$|\s*,|\s*$)/gi)];
    for (const m of allMatches) {
      const qty = parseInt(m[1], 10);
      const product = matchProduct(m[2]);
      items.push({ name: product.name, quantity: qty, unitPrice: product.unitPrice, lineTotal: Math.round(qty * product.unitPrice * 100) / 100 });
    }
  }

  const total = items.reduce((s, i) => s + i.lineTotal, 0);

  return { customer: customer || "Unknown Customer", items, total: Math.round(total * 100) / 100 };
}

const PAGE_SIZE = 25;
const MAX_COLS  = 15;
const MAX_CELL  = 100;
const truncate  = v => { const s = String(v); return s.length > MAX_CELL ? s.slice(0, MAX_CELL) + "…" : s; };
const fmtEUR    = v => `${Number(v).toLocaleString("es-ES", { minimumFractionDigits:2, maximumFractionDigits:2 })} €`;

// ─── FlatTable — Sage DS flat table with sticky first column + lazy loading ───
function FlatTable({ rows: allRows, maxHeight=420, fill=false }) {
  const [loaded, setLoaded] = useState(PAGE_SIZE);
  const [isLoadingMore, setIsLoadingMore] = useState(false);
  const scrollRef = useRef(null);
  const rows = allRows.slice(0, loaded);
  const hasMore = loaded < allRows.length;

  const COLS = [
    { key:"inv",         label:"Invoice no.",       w:110, sticky:true  },
    { key:"customer",    label:"Customer",           w:150, sticky:false },
    { key:"due",         label:"Due date",           w:110, sticky:false },
    { key:"daysOver",    label:"Days overdue",       w:110, sticky:false },
    { key:"outstanding", label:"Outstanding amount", w:140, sticky:false },
    { key:"total",       label:"Invoice total",      w:120, sticky:false },
  ];

  // Render cell value with formatting + badge for days overdue
  const renderCell = (col, row) => {
    const raw = row[col.key];
    if (col.key === "outstanding" || col.key === "total") return fmtEUR(raw);
    if (col.key === "inv") return (
      <a href="#" onClick={e => e.preventDefault()}
        style={{ color:T.actionBg, textDecoration:"none", fontWeight:500, cursor:"pointer" }}
        onMouseEnter={e => e.target.style.textDecoration="underline"}
        onMouseLeave={e => e.target.style.textDecoration="none"}>
        {truncate(raw)}
      </a>
    );
    if (col.key === "daysOver") {
      if (raw === 0) return <span style={{ color:T.txtSubtle }}>Due today</span>;
      const color = raw >= 30 ? "#db004e" : raw >= 14 ? T.warning : T.txtDefault;
      return <span style={{ color, fontWeight: raw >= 14 ? 600 : 400 }}>{raw}d</span>;
    }
    return truncate(raw);
  };

  // Lazy load on scroll
  const onScroll = useCallback(() => {
    if (!scrollRef.current || !hasMore || isLoadingMore) return;
    const { scrollTop, scrollHeight, clientHeight } = scrollRef.current;
    if (scrollHeight - scrollTop - clientHeight < 80) {
      setIsLoadingMore(true);
      setTimeout(() => {
        setLoaded(l => Math.min(l + PAGE_SIZE, allRows.length));
        setIsLoadingMore(false);
      }, 400);
    }
  }, [hasMore, isLoadingMore, allRows.length]);

  // Sage DS flat table tokens
  const hdrBg   = T.isDark ? "#2a3a4a" : T.bgSubtle;
  const rowEven = T.bgSurface;
  const rowOdd  = T.isDark ? "#222222" : "#f7f8f9";
  const border  = T.borderSubtle;
  const sticky0W = COLS[0].w;

  return (
    <div style={{ position:"relative", border:`1px solid ${border}`, borderRadius:8, overflow:"hidden", display:"flex", flexDirection:"column", flex: maxHeight === "fill" ? 1 : undefined, height: maxHeight === "fill" ? "100%" : "auto", minHeight: maxHeight === "fill" ? 0 : undefined }}>
      {/* Horizontally scrollable container */}
      <div ref={scrollRef} onScroll={onScroll}
        style={{ overflowX:"auto", overflowY:"auto", maxHeight: maxHeight === "fill" ? undefined : maxHeight, flex: maxHeight === "fill" ? 1 : undefined, minHeight: maxHeight === "fill" ? 0 : undefined, WebkitOverflowScrolling:"touch" }}>
        <div style={{ minWidth: COLS.reduce((a,c)=>a+c.w, 0) }}>

          {/* Header row */}
          <div style={{ display:"flex", position:"sticky", top:0, zIndex:10, background:hdrBg, borderBottom:`1.5px solid ${T.isDark ? "#3d5166" : T.bgModerate}` }}>
            {COLS.map((col, ci) => (
              <div key={col.key} style={{
                width: col.w, minWidth: col.w, flexShrink:0,
                padding:"11px 12px",
                fontSize:14, fontWeight:500, color:T.isDark?"#ffffff":T.txtSubtle,
                whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                position: col.sticky ? "sticky" : "relative",
                left: col.sticky ? 0 : undefined,
                zIndex: col.sticky ? 11 : undefined,
                background: T.isDark ? "#2a3a4a" : hdrBg,
                borderRight: col.sticky ? `1px solid ${T.isDark ? "#3d5166" : T.bgModerate}` : undefined,
                textAlign: (col.key==="outstanding"||col.key==="total") ? "right" : "left",
              }}>
                {col.label}
              </div>
            ))}
          </div>

          {/* Data rows */}
          {rows.map((row, ri) => {
            const bg = ri % 2 === 0 ? rowEven : rowOdd;
            return (
              <div key={row.inv} style={{ display:"flex", borderBottom:`1px solid ${border}`, background:bg }}>
                {COLS.map((col, ci) => (
                  <div key={col.key} style={{
                    width: col.w, minWidth: col.w, flexShrink:0,
                    padding:"11px 12px",
                    fontSize:14, color: T.txtDefault,
                    whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                    position: col.sticky ? "sticky" : "relative",
                    left: col.sticky ? 0 : undefined,
                    zIndex: col.sticky ? 5 : undefined,
                    background: col.sticky ? bg : undefined,
                    borderRight: col.sticky ? `1px solid ${border}` : undefined,
                    fontWeight: col.sticky ? 500 : 400,
                    textAlign: (col.key==="outstanding"||col.key==="total") ? "right" : "left",
                  }}>
                    {renderCell(col, row)}
                  </div>
                ))}
              </div>
            );
          })}

          {/* Lazy load row */}
          {isLoadingMore && (
            <div style={{ display:"flex", alignItems:"center", justifyContent:"center", padding:"14px", gap:8, background:rowEven }}>
              {[0,1,2].map(i=>(
                <div key={i} style={{ width:6, height:6, borderRadius:"50%", background:T.bgModerate, animation:`bounce 1.2s ease-in-out ${i*0.18}s infinite`}}/>
              ))}
            </div>
          )}

          {/* End of results */}
          {!hasMore && allRows.length > PAGE_SIZE && (
            <div style={{ padding:"12px", textAlign:"center", fontSize:13, color:T.txtFaint }}>
              All {allRows.length} invoices loaded
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

// ─── Loading State — animated GIF + sequenced messages ────────────────────────
const ANALYSING_STEPS = [
  "Processing",
  "Analysing your request",
  "Reading your data",
  "Preparing your response",
];

function AnalysingState({ query }) {
  const [stepIdx, setStepIdx]   = useState(0);
  const [visible, setVisible]   = useState(false);  // fade-in on mount

  // Derive context-aware steps from query
  const steps = React.useMemo(() => {
    const q = (query || "").toLowerCase();
    if (q.includes("create") && q.includes("invoice") || q.includes("make") && q.includes("invoice")) {
      return ["Processing", "Analysing your request", "Reading product data", "Generating invoice preview"];
    }
    if (q.includes("saving invoice")) {
      return ["Processing", "Saving invoice", "Updating records"];
    }
    if (q.includes("invoice") || q.includes("overdue") || q.includes("unpaid")) {
      return ["Processing", "Analysing your request", "Reading invoice data", "Preparing your response"];
    }
    if (q.includes("cash flow") || q.includes("cashflow")) {
      return ["Processing", "Analysing your request", "Reading cash flow data", "Preparing your response"];
    }
    if (q.includes("revenue") || q.includes("sales")) {
      return ["Processing", "Analysing your request", "Reading sales data", "Preparing your response"];
    }
    if (q.includes("expense") || q.includes("spending")) {
      return ["Processing", "Analysing your request", "Reading expense data", "Preparing your response"];
    }
    return ANALYSING_STEPS;
  }, [query]);

  // Fade in on mount
  useEffect(() => {
    const t = requestAnimationFrame(() => setVisible(true));
    return () => cancelAnimationFrame(t);
  }, []);

  // Step through messages: 0ms, 600ms, 1300ms, 2100ms
  useEffect(() => {
    const delays = [0, 600, 1300, 2100];
    const timers = delays.slice(1).map((d, i) =>
      setTimeout(() => setStepIdx(i + 1), d)
    );
    return () => timers.forEach(clearTimeout);
  }, []);

  return (
    <div style={{
      display: "flex",
      alignItems: "center",
      gap: 10,
      padding: "4px 0 12px",
      marginRight: 32,
      opacity: visible ? 1 : 0,
      transform: visible ? "translateY(0)" : "translateY(6px)",
      transition: "opacity 0.28s ease-out, transform 0.28s ease-out",
    }}>
      <div style={{ flexShrink:0, display:"flex", borderRadius:4 }}>
      <img
        src="data:image/gif;base64,R0lGODlhMAAwAPcAMQD/AAGT0wKQ2gKUyAWVugWWrwaXpAeWyQmYmgmZhwqO3QyZpw2Y1Q2bcg6Zuw6cahCciBCdYBCeVRGN3hKdehOdnBWgSxaJ3xacxRagcReU3xehWhietxigiRihZhmeqx+imSCR4CGhyiKh1yOA4yOlcCSleiakryallSenZieoUSiloSmf4SmniCqmui6qci+qfTOJ5TOrjDR55zSR5DSa4zSp1TSrmTWqxTWtbjauXzek4jesrTeudjmuhTxz6j6s3j+vtECZ5kCwokKB6UKvx0WxvEWzgUazlUe1a0h060is5Ui0fUmx20qf50q1iUxr7U2E61Cr51G2x1S23Fa5rVdt71e7hliD7Vi5tVm6oVq7llu06Fx171262F27xl5h8mCb7GGs6mK+tGK/hGO/oGS852V68GW/qWXAl2a/zWdo82eH72e26mld9G7Eo29e9XDA53Gh7nHD1nLExHLFs3Ns9HSO8XV583W07XbHrXdU+HfHnXjHx3pc+HvA7Xyb8X/H54CK9IDJ2oHLuIRR+oTNqIVu+IXMy4Z89obB7odd+YeM9Ymq8orN6Iue84y88IzQt4/Q14/Rx5BK/pGL95HSq5LK8JR2+ZSS95So9JTR6pTTupVV/Zec9pe+8phm/JjUxpm185nU1pp++pzV4Z3U7J7O8qLA9KNq/qPY26SB+6St9qWg+KaK+6bV8Kbbvqe99qfb0ah3/ajO9Krcya6v+K7d1K7ewrCD/bCR/LC+97Dd7rDe47LM9rOd+7PW9bSM/bTgxrbh0rqu+7ri27vg8b2V/r3a9r/N+L/l0MCe/cDl5MK2+8LD+sLk8sOl/cXn28bY+Meq/sfN+snn9Mno5czq3M3q6s7m9c7r3s+x/tLL/NO8/tPC/dTU+9Tb+9Xu39Xu59bk+tbs+Nbu8d3K/t7m+97v+t7x6d/V/d/x8uLj/OPz8OXx++bX/ufi/ej17+nu/On19e3n/u73/PDw/fD59vP4/PXw/vX7+Pf5/fr6/vv9/f3+/v///yH/C05FVFNDQVBFMi4wAwEAAAAh+QQFBAAAACwAAAAAMAAwAIcA/wABk9MCkNoClMgFlboFlq8Gl6QHlskJmJoJmYcKjt0MmacNmNUNm3IOmbsOnGoQnIgQnWAQnlURjd4SnXoTnZwVoEsWid8WnMUWoHEXlN8XoVoYnrcYoIkYoWYZnqsfopkgkeAhocoiodcjgOMjpXAkpXompK8mpZUnp2YnqFEopaEpn+Epp4gqprouqnIvqn0zieUzq4w0eec0keQ0muM0qdU0q5k1qsU1rW42rl83pOI3rK03rnY5roU8c+o+rN4/r7RAmeZAsKJCgelCr8dFsbxFs4FGs5VHtWtIdOtIrOVItH1JsdtKn+dKtYlMa+1NhOtQq+dRtsdUttxWua1Xbe9Xu4ZYg+1YubVZuqFau5ZbtOhcde9duthdu8ZeYfJgm+xhrOpivrRiv4Rjv6BkvOdlevBlv6llwJdmv81naPNnh+9ntuppXfRuxKNvXvVwwOdxoe5xw9ZyxMRyxbNzbPR0jvF1efN1tO12x613VPh3x514x8d6XPh7wO18m/F/x+eAivSAydqBy7iEUfqEzaiFbviFzMuGfPaGwe6HXfmHjPWJqvKKzeiLnvOMvPCM0LeP0NeP0ceQSv6Ri/eR0quSyvCUdvmUkveUqPSU0eqU07qVVf2XnPaXvvKYZvyY1MaZtfOZ1Naafvqc1eGd1OyezvKiwPSjav6j2NukgfukrfaloPimivum1fCm276nvfan29God/2ozvSq3Mmur/iu3dSu3sKwg/2wkfywvvew3e6w3uOyzPaznfuz1vW0jP204Ma24dK6rvu64tu74PG9lf692va/zfi/5dDAnv3A5eTCtvvCw/rC5PLDpf3F59vG2PjHqv7HzfrJ5/TJ6OXM6tzN6urO5vXO6 // ─── Day Stamp ────────────────────────────────────────────────────────────────
// Variants per spec: previous year shows full "Friday 31 December 2023",
// 7+ days ago shows "Monday 20 June", 2–7 days "Tuesday", yesterday "Yesterday", today "Today"
function formatDayLabel(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diffMs = today - target;
  const diffDays = Math.round(diffMs / (1000 * 60 * 60 * 24));
  const prevYear = d.getFullYear() < now.getFullYear();
  const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  if (diffDays === 0) return "Today";
  if (diffDays === 1) return "Yesterday";
  if (prevYear) return `${dayNames[d.getDay()]} ${d.getDate()} ${monthNames[d.getMonth()]} ${d.getFullYear()}`;
  if (diffDays >= 7) return `${dayNames[d.getDay()]} ${d.getDate()} ${monthNames[d.getMonth()]}`;
  return dayNames[d.getDay()];
}

function DayStamp({ dateStr }) {
  const label = formatDayLabel(dateStr);
  return (
    <div style={{ display:"flex", alignItems:"center", gap:0, margin:"8px 0", padding:"0 24px" }}>
      <div style={{ flex:1, height:1, background:T.bgModerate }}/>
      <span style={{ padding:"0 12px", fontSize:14, color:T.txtSubtle, whiteSpace:"nowrap", fontWeight:400 }}>{label}</span>
      <div style={{ flex:1, height:1, background:T.bgModerate }}/>
    </div>
  );
}

// ─── Inserts DayStamp markers between messages that cross a date boundary ──────
function insertDayStamps(messages) {
  if (!messages.length) return [];
  const result = [];
  let lastDate = null;
  messages.forEach((msg, i) => {
    // Derive a date string from the message — use msg.date if present, else today
    const dateStr = msg.date || new Date().toISOString().slice(0, 10);
    if (dateStr !== lastDate) {
      result.push({ _type:"daystamp", dateStr, _key:`ds-${dateStr}-${i}` });
      lastDate = dateStr;
    }
    result.push(msg);
  });
  return result;
}

// ─── Invoice Preview Table (inline in bubble, 3 cols max) ─────────────────────
// ─── InvoicePreview — dynamic columns + sort, shown inline in copilot bubble ──
// sortKey: "daysOver" | "outstanding"
// cols: array of { key, label } — drives which columns are shown
const PREVIEW_ROWS = 5;

// Pre-compute summary stats once
const TOTAL_OUTSTANDING = INVOICES_ALL.reduce((s, r) => s + r.outstanding, 0);

function InvoicePreview({ onOpen, sortKey = "daysOver", cols }) {
  // Default cols if not specified
  const columns = cols || [
    { key:"inv",      label:"Invoice",       w:"30%" },
    { key:"customer", label:"Customer",      w:"40%" },
    { key:"daysOver", label:"Days overdue",  w:"30%" },
  ];

  // Sort a copy of all invoices by the requested key (descending)
  const sorted = [...INVOICES_ALL].sort((a, b) => b[sortKey] - a[sortKey]);
  const rows   = sorted.slice(0, PREVIEW_ROWS);

  // Summary line
  const topVal = sortKey === "outstanding"
    ? `The top 5 highest value overdue invoices are shown below.`
    : `The top 5 most overdue invoices are shown below.`;
  const summary = `${topVal} You have ${INVOICES_ALL.length} overdue invoices in total, with a total outstanding value of ${fmtEUR(TOTAL_OUTSTANDING)}.`;

  const renderCell = (col, row) => {
    if (col.key === "daysOver") {
      const d = row.daysOver;
      if (d === 0) return <span style={{ color:T.txtSubtle }}>Due today</span>;
      const color = d >= 30 ? "#db004e" : d >= 14 ? T.warning : T.txtDefault;
      return <span style={{ color, fontWeight: d >= 14 ? 600 : 400 }}>{d}d</span>;
    }
    if (col.key === "outstanding") return <span>{fmtEUR(row.outstanding)}</span>;
    return row[col.key];
  };

  return (
    <div style={{ marginTop:10 }}>
      {/* Summary text */}
      <p style={{ fontSize:14, color:T.txtSubtle, lineHeight:1.55, margin:"0 0 12px" }}>{summary}</p>
      {/* Table */}
      <div style={{ borderRadius:12, overflow:"hidden", border:`1px solid ${T.borderSubtle}`, boxShadow:T.isDark ? "0 1px 4px rgba(0,0,0,0.3)" : "0 1px 4px rgba(0,0,0,0.06)" }}>
        {/* Dark header row */}
        <div style={{ display:"flex", background:T.isDark ? "#2a3a4a" : "#3d5166" }}>
          {columns.map(col => (
            <div key={col.key} style={{ width:col.w, padding:"11px 14px", fontSize:14, fontWeight:500, color:"#ffffff", flexShrink:0, whiteSpace:"nowrap", letterSpacing:"0.01em" }}>
              {col.label}
            </div>
          ))}
        </div>
        {/* Data rows */}
        {rows.map((row, i) => {
          const bg = i % 2 === 0 ? T.bgSurface : (T.isDark ? "#222222" : "#f7f9fb");
          const isLast = i === PREVIEW_ROWS - 1;
          return (
            <div key={row.inv} style={{ display:"flex", borderBottom: i < rows.length - 1 ? `1px solid ${T.borderSubtle}` : "none", background:bg, opacity: isLast ? 0.35 : 1 }}>
              {columns.map(col => (
                <div key={col.key} style={{ width:col.w, padding:"11px 14px", fontSize:14, flexShrink:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                  color: col.key==="inv" ? T.actionBg : T.txtDefault,
                  fontWeight: col.key==="inv" ? 600 : 400,
                  textDecoration: col.key==="inv" ? "underline" : "none",
                }}>
                  {renderCell(col, row)}
                </div>
              ))}
            </div>
          );
        })}
      </div>
      {/* Two-button row */}
      <div style={{ display:"flex", gap:10, marginTop:14 }}>
        <button style={{ background:T.actionBg, border:"none", borderRadius:999, padding:"11px 20px", fontSize:14, fontWeight:500, color:T.actionLbl, cursor:"default", fontFamily:"Roboto,sans-serif", letterSpacing:"0.01em" }}>
          Send {INVOICES_ALL.length} reminders
        </button>
        <button onClick={onOpen} style={{ background:"transparent", border:`2px solid ${T.actionBg}`, borderRadius:999, padding:"9px 20px", fontSize:14, fontWeight:500, color:T.actionBg, cursor:"pointer", fontFamily:"Roboto,sans-serif" }}>
          Open
        </button>
      </div>
    </div>
  );
}

// ─── Message Bubbles ──────────────────────────────────────────────────────────
function MessageBubble({ msg, onOpenSheet, onSend, onSaveInvoice, bubbleRef }) {
  const isUser  = msg.role === "user";
  const isChart  = ["linechart","columnchart","rowchart","saleschart"].includes(msg.type);
  const hasSheet = isChart || msg.type === "invoicetable";

  if (isUser) return (
    <div ref={bubbleRef} style={{ display:"flex", justifyContent:"flex-end", marginBottom:16, marginLeft:32, animation:"fadeUp 0.2s ease-out" }}>
      <div style={{ maxWidth:"75%", background:T.isDark ? "rgba(255,255,255,0.1)" : "#f0f1f2", borderRadius:20, padding:"12px 16px", border:T.isDark ? "1px solid rgba(255,255,255,0.12)" : "1px solid #e2e4e6", fontSize:14, lineHeight:1.55, color:T.txtDefault }}>
        {msg.content}
      </div>
    </div>
  );

  const chartTitles = { linechart:"Cash Flow Over Time", columnchart:"Revenue by Month", rowchart:"Top Expenses", saleschart:"Sales Performance vs Previous Year" };

  // Invoice guidance bubble
  if (msg.type === "invoiceguide") {
    return (
      <div ref={bubbleRef} style={{ display:"flex", justifyContent:"flex-start", marginBottom:16, marginRight:32, animation:"fadeUp 0.2s ease-out" }}>
        <div style={{ width:"100%", background:T.bgSurface, borderRadius:20, padding:"16px", border:`1px solid ${T.borderSubtle}` }}>
          <InvoiceGuidance/>
        </div>
      </div>
    );
  }

  // Invoice preview bubble with Save
  if (msg.type === "invoicepreview") {
    return (
      <div ref={bubbleRef} style={{ display:"flex", justifyContent:"flex-start", marginBottom:16, marginRight:32, animation:"fadeUp 0.2s ease-out" }}>
        <div style={{ width:"100%", background:T.bgSurface, borderRadius:20, padding:"16px", border:`1px solid ${T.borderSubtle}` }}>
          {msg.content && (
            <div style={{ fontSize:14, lineHeight:1.6, color:T.txtDefault, marginBottom:4 }}>{msg.content}</div>
          )}
          <InvoicePreviewCard invoice={msg.invoice} onSave={() => onSaveInvoice && onSaveInvoice(msg)}/>
        </div>
      </div>
    );
  }

  // Invoice confirmation bubble
  if (msg.type === "invoiceconfirm") {
    return (
      <div ref={bubbleRef} style={{ display:"flex", justifyContent:"flex-start", marginBottom:16, marginRight:32, animation:"fadeUp 0.2s ease-out" }}>
        <div style={{ width:"100%", background:T.bgSurface, borderRadius:20, padding:"16px", border:`1px solid ${T.borderSubtle}` }}>
          {msg.content && (
            <div style={{ fontSize:14, lineHeight:1.6, color:T.txtDefault, marginBottom:4 }}>{msg.content}</div>
          )}
          <InvoiceConfirmation invoice={msg.invoice}/>
        </div>
      </div>
    );
  }

  // Invoice table: same bubble chrome as all other copilot responses
  if (msg.type === "invoicetable") {
    return (
      <div ref={bubbleRef} style={{ display:"flex", justifyContent:"flex-start", marginBottom:16, marginRight:32, animation:"fadeUp 0.2s ease-out" }}>
        <div style={{ width:"100%", background:T.bgSurface, borderRadius:20, padding:"16px", border:`1px solid ${T.borderSubtle}` }}>
          {msg.content && (
            <div style={{ fontSize:14, lineHeight:1.6, color:T.txtDefault, marginBottom:4 }}>{msg.content}</div>
          )}
          <InvoicePreview onOpen={() => onOpenSheet(msg)} sortKey={msg.sortKey || "daysOver"} cols={msg.cols} />
        </div>
      </div>
    );
  }

  return (
    <div style={{ display:"flex", justifyContent:"flex-start", marginBottom:16, marginRight:32, animation:"fadeUp 0.2s ease-out" }}>
      <div style={{ width:"100%", background:T.bgSurface, borderRadius:20, padding:"16px", border:`1px solid ${T.borderSubtle}` }}>
        {/* Response text */}
        {(msg.content || msg.intro) && (
          <div style={{ fontSize:14, lineHeight:1.6, color:T.txtDefault }}>{msg.content || msg.intro}</div>
        )}
        {/* Clarification option buttons */}
        {msg.type === "clarify" && msg.options && (
          <div style={{ display:"flex", gap:8, marginTop:12, flexWrap:"wrap" }}>
            {msg.options.map(opt => (
              <button key={opt} onClick={() => onSend(opt)}
                style={{ background:"none", border:`1.5px solid ${T.actionBg}`, borderRadius:999, padding:"8px 16px", fontSize:14, fontWeight:500, color:T.actionBg, cursor:"pointer", fontFamily:"Roboto,sans-serif", whiteSpace:"nowrap" }}>
                {opt}
              </button>
            ))}
          </div>
        )}
        {/* Canvas card — charts only */}
        {isChart && (
          <CanvasCard
            title={chartTitles[msg.type]}
            subtitle={`Today, ${msg.time}`}
            ctaLabel="Open"
            onCta={() => onOpenSheet(msg)}
          />
        )}
      </div>
    </div>
  );
}

// ─── Chart components ─────────────────────────────────────────────────────────
const SALES_PERF = [
  { month:"Oct", y2026:32400, y2025:28100 },
  { month:"Nov", y2026:38900, y2025:31500 },
  { month:"Dec", y2026:45200, y2025:39800 },
  { month:"Jan", y2026:29700, y2025:27200 },
  { month:"Feb", y2026:34100, y2025:30400 },
  { month:"Mar", y2026:10500, y2025:8000  },
];

function CTip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background:T.isDark ? "#2a2a2a" : "#1a1a1a", borderRadius:6, padding:"8px 12px" }}>
      <div style={{ fontSize:12, color:T.isDark ? "rgba(255,255,255,0.5)" : "rgba(0,0,0,0.45)", marginBottom:4 }}>{label}</div>
      {payload.map((p,i) => (
        <div key={i} style={{ display:"flex", alignItems:"center", gap:5, fontSize:12, color:"#fff", marginBottom:2 }}>
          <div style={{ width:6, height:6, borderRadius:"50%", background:p.color||p.fill }}/>
          <span style={{ color:"rgba(255,255,255,0.5)" }}>{p.name}:</span>
          <span style={{ fontWeight:500 }}>{fmt(p.value)}</span>
        </div>
      ))}
    </div>
  );
}
function RBar({ x, y, width, height, fill }) {
  if (!height || height <= 0) return null;
  const r = Math.min(4, height/2);
  return <path d={`M${x},${y+height} L${x},${y+r} Q${x},${y} ${x+r},${y} L${x+width-r},${y} Q${x+width},${y} ${x+width},${y+r} L${x+width},${y+height} Z`} fill={fill}/>;
}
function CashFlowChart() {
  const Dot = ({ cx, cy, stroke }) => <circle cx={cx} cy={cy} r={4} fill="#fff" stroke={stroke} strokeWidth={2}/>;
  return (
    <div style={{ height:185 }}>
      <ResponsiveContainer width="100%" height="100%">
        <LineChart data={CASHFLOW} margin={{ top:8, right:4, bottom:0, left:-24 }}>
          <CartesianGrid strokeDasharray="3 3" stroke={T.borderSubtle} vertical={false}/>
          <XAxis dataKey="month" tick={{ fontSize:10, fill:T.txtSubtle }} axisLine={false} tickLine={false}/>
          <YAxis tick={{ fontSize:9, fill:T.txtSubtle }} axisLine={false} tickLine={false} tickFormatter={fmt}/>
          <Tooltip content={<CTip/>}/>
          <Line type="monotone" dataKey="collected" name="Collected" stroke={T.actionBg} strokeWidth={2.5} dot={<Dot stroke={T.actionBg}/>} activeDot={{ r:5, fill:T.actionBg, stroke:"#fff", strokeWidth:2 }}/>
          <Line type="monotone" dataKey="pending"   name="Pending"   stroke={T.warning}  strokeWidth={2} strokeDasharray="5 4" dot={<Dot stroke={T.warning}/>}/>
        </LineChart>
      </ResponsiveContainer>
    </div>
  );
}
function RevenueChart() {
  return (
    <div style={{ height:185 }}>
      <ResponsiveContainer width="100%" height="100%">
        <BarChart data={REVENUE} margin={{ top:6, right:4, bottom:0, left:-24 }} barCategoryGap="28%" barGap={3}>
          <CartesianGrid strokeDasharray="3 3" stroke={T.borderSubtle} vertical={false}/>
          <XAxis dataKey="month" tick={{ fontSize:10, fill:T.txtSubtle }} axisLine={false} tickLine={false}/>
          <YAxis tick={{ fontSize:9, fill:T.txtSubtle }} axisLine={false} tickLine={false} tickFormatter={fmt}/>
          <Tooltip content={<CTip/>} cursor={{ fill:"rgba(0,0,0,0.04)" }}/>
          <Bar dataKey="target"  name="Target"  fill={T.bgModerate} shape={<RBar/>}/>
          <Bar dataKey="revenue" name="Revenue" fill={T.actionBg}   shape={<RBar/>}/>
        </BarChart>
      </ResponsiveContainer>
    </div>
  );
}
function ExpensesChart() {
  const [prog, setProg] = useState(0);
  useEffect(() => {
    let s = null;
    const ease = t => 1 - Math.pow(1-t, 3);
    const step = ts => { if (!s) s = ts; const p = Math.min((ts-s)/900, 1); setProg(ease(p)); if (p < 1) requestAnimationFrame(step); };
    const id = setTimeout(() => requestAnimationFrame(step), 100);
    return () => clearTimeout(id);
  }, []);
  const max  = Math.max(...EXPENSES.map(d => d.amount));
  const cols = [T.actionBg, T.actionHov, "#005e14", T.txtSubtle, T.bgModerate];
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
      {EXPENSES.map((d,i) => (
        <div key={d.category}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
            <span style={{ fontSize:14, fontWeight:500, color:T.txtDefault }}>{d.category}</span>
            <span style={{ fontSize:14, color:T.txtSubtle }}>{fmtFull(d.amount)}</span>
          </div>
          <div style={{ width:"100%", height:8, background:T.bgSubtle, borderRadius:4, overflow:"hidden" }}>
            <div style={{ width:`${(d.amount/max)*100*prog}%`, height:"100%", background:cols[i], borderRadius:4 }}/>
          </div>
        </div>
      ))}
    </div>
  );
}
function SalesPerformanceChart() {
  return (
    <div style={{ height:185 }}>
      <ResponsiveContainer width="100%" height="100%">
        <BarChart data={SALES_PERF} margin={{ top:6, right:4, bottom:0, left:-24 }} barCategoryGap="28%" barGap={3}>
          <CartesianGrid strokeDasharray="3 3" stroke={T.borderSubtle} vertical={false}/>
          <XAxis dataKey="month" tick={{ fontSize:10, fill:T.txtSubtle }} axisLine={false} tickLine={false}/>
          <YAxis tick={{ fontSize:9, fill:T.txtSubtle }} axisLine={false} tickLine={false} tickFormatter={fmt}/>
          <Tooltip content={<CTip/>} cursor={{ fill:"rgba(0,0,0,0.04)" }}/>
          <Bar dataKey="y2025" name="2025" fill={T.bgModerate} shape={<RBar/>}/>
          <Bar dataKey="y2026" name="2026" fill={T.actionBg}   shape={<RBar/>}/>
        </BarChart>
      </ResponsiveContainer>
    </div>
  );
}
function DataTable({ cols, rows }) {
  return (
    <div style={{ marginTop:16, borderRadius:6, overflow:"hidden", border:`1px solid ${T.borderSubtle}` }}>
      <div style={{ display:"grid", gridTemplateColumns:`repeat(${cols.length},1fr)`, background:T.isDark?"#2a3a4a":T.bgSubtle }}>
        {cols.map(c => <div key={c} style={{ padding:"11px 12px", fontSize:14, fontWeight:500, color:T.isDark?"#ffffff":T.txtSubtle, borderBottom:`1px solid ${T.isDark?"#3d5166":T.bgModerate}` }}>{c}</div>)}
      </div>
      {rows.map((row,i) => (
        <div key={i} style={{ display:"grid", gridTemplateColumns:`repeat(${cols.length},1fr)`, background:i%2===0?T.bgSurface:(T.isDark?"#222222":"#f7f8f9") }}>
          {row.map((cell,j) => <div key={j} style={{ padding:"11px 12px", fontSize:14, color:j===0?T.txtDefault:T.txtSubtle, borderBottom:i<rows.length-1?`1px solid ${T.borderSubtle}`:"none" }}>{cell}</div>)}
        </div>
      ))}
    </div>
  );
}

// ─── Chart Sheet ──────────────────────────────────────────────────────────────
function ChartSheet({ msg, onClose }) {
  const [vis, setVis] = useState(false);
  useEffect(() => { requestAnimationFrame(() => setVis(true)); }, []);
  const close = () => { setVis(false); setTimeout(onClose, 320); };
  const titles = { linechart:"Cash Flow Over Time", columnchart:"Revenue by Month", rowchart:"Top Expenses", saleschart:"Sales Performance vs Previous Year" };
  const subs   = { linechart:"Oct 2025 – Mar 2026  ·  Collected vs Pending", columnchart:"Oct 2025 – Mar 2026  ·  Revenue vs Target", rowchart:"March 2026  ·  By category", saleschart:"Oct 2025 – Mar 2026  ·  2026 vs 2025" };
  const body = () => {
    if (msg.type === "linechart")   return <><CashFlowChart/><div style={{ display:"flex", gap:16, marginTop:10 }}>{[{l:"Collected",c:T.actionBg,dash:false},{l:"Pending",c:T.warning,dash:true}].map(x => (<div key={x.l} style={{ display:"flex", alignItems:"center", gap:6 }}>{x.dash ? <svg width="18" height="4"><line x1="0" y1="2" x2="18" y2="2" stroke={x.c} strokeWidth="2" strokeDasharray="4 3"/></svg> : <div style={{ width:18, height:2, background:x.c, borderRadius:2 }}/>}<span style={{ fontSize:13, color:T.txtSubtle }}>{x.l}</span></div>))}</div><DataTable cols={["Month","Collected","Pending"]} rows={CASHFLOW.map(d => [d.month, fmtFull(d.collected), fmtFull(d.pending)])}/></>;
    if (msg.type === "columnchart") return <><RevenueChart/><div style={{ display:"flex", gap:16, marginTop:10 }}>{[{l:"Revenue",c:T.actionBg},{l:"Target",c:T.bgModerate}].map(x => (<div key={x.l} style={{ display:"flex", alignItems:"center", gap:6 }}><div style={{ width:10, height:10, borderRadius:2, background:x.c }}/><span style={{ fontSize:13, color:T.txtSubtle }}>{x.l}</span></div>))}</div><DataTable cols={["Month","Revenue","Target"]} rows={REVENUE.map(d => [d.month, fmtFull(d.revenue), fmtFull(d.target)])}/></>;
    if (msg.type === "rowchart")    return <><ExpensesChart/><DataTable cols={["Category","Amount"]} rows={EXPENSES.map(d => [d.category, fmtFull(d.amount)])}/></>;
    if (msg.type === "saleschart")  {
      const salesTableRows = SALES_PERF.map(d => {
        const pct = Math.round(((d.y2026 - d.y2025) / d.y2025) * 100);
        const sign = pct >= 0 ? "+" : "";
        return [d.month, fmtFull(d.y2026), fmtFull(d.y2025), `${sign}${pct}%`];
      });
      return <><SalesPerformanceChart/><div style={{ display:"flex", gap:16, marginTop:10 }}>{[{l:"2026",c:T.actionBg},{l:"2025",c:T.bgModerate}].map(x => (<div key={x.l} style={{ display:"flex", alignItems:"center", gap:6 }}><div style={{ width:10, height:10, borderRadius:2, background:x.c }}/><span style={{ fontSize:13, color:T.txtSubtle }}>{x.l}</span></div>))}</div><DataTable cols={["Month","2026","2025","Change"]} rows={salesTableRows}/></>;
    }
  };
  return (
    <div style={{ position:"absolute", inset:0, zIndex:200, display:"flex", flexDirection:"column", justifyContent:"flex-end", height:"100%" }}>
      <div onClick={close} style={{ position:"absolute", inset:0, background:`rgba(0,0,0,${vis?0.48:0})`, transition:"background 0.4s" }}/>
      <div style={{ position:"relative", zIndex:1, background:T.bgSurface, borderRadius:"16px 16px 0 0", height:"88%", display:"flex", flexDirection:"column", transform:vis?"translateY(0)":"translateY(100%)", transition:"transform 0.4s cubic-bezier(0.32,0.72,0,1)", boxShadow:"0 -4px 32px rgba(0,0,0,0.12)" }}>
        <div style={{ padding:"12px 16px 0", flexShrink:0 }}>
          <div style={{ width:32, height:4, background:T.bgModerate, borderRadius:4, margin:"0 auto 16px" }}/>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", paddingBottom:14, borderBottom:`1px solid ${T.borderSubtle}` }}>
            <div>
              <div style={{ fontSize:17, fontWeight:700, color:T.txtDefault }}>{titles[msg.type]}</div>
              <div style={{ fontSize:14, color:T.txtSubtle, marginTop:2 }}>{subs[msg.type]}</div>
            </div>
            <button onClick={close} style={{ width:30, height:30, borderRadius:"50%", background:T.bgSubtle, border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>

            </button>
          </div>
        </div>
        <div style={{ flex:1, overflowY:"auto", padding:"16px 16px 32px" }}>{body()}</div>
      </div>
    </div>
  );

// ─── AI router ────────────────────────────────────────────────────────────────
function getAIResponse(input) {
  const q = input.toLowerCase();

  // ── Create sales invoice — guidance prompt ──────────────────────────────────
  if (q === "create sales invoice with speech" || q === "create a sales invoice" || q === "create sales invoice") {
    return { type:"invoiceguide" };
  }

  // ── Create invoice with details — parse and generate preview ──────────────
  const isCreateInvoice =
    (q.includes("create") || q.includes("make") || q.includes("generate") || q.includes("new")) &&
    (q.includes("invoice") || q.includes("sales invoice"));
  const hasInvoiceDetails = isCreateInvoice && (q.includes("for ") || q.match(/\d+\s+\w/));

  if (hasInvoiceDetails) {
    const invoice = parseInvoicePrompt(input);
    if (invoice.items.length > 0) {
      return {
        type:"invoicepreview",
        content:`Here's a preview of your sales invoice for ${invoice.customer}.`,
        invoice,
      };
    }
  }

  // ── Clarification: bare "overdue invoices" — ask sales or purchase ────────
  const isBarelyClarify =
    (q === "overdue invoices" || q === "show overdue invoices") ||
    (q.includes("overdue") && q.includes("invoice") && !q.includes("sales") && !q.includes("purchase") && !q.includes("sale") && !q.includes("most overdue") && !q.includes("highest") && !q.includes("value"));
  if (isBarelyClarify)
    return { type:"clarify", content:"Did you mean overdue sales invoices or overdue purchase invoices?", options:["Sales invoices","Purchase invoices"] };

  // ── Invoice intent — detect sort preference ───────────────────────────────
  const isInvoiceIntent =
    (q.includes("overdue") || q.includes("unpaid") || q.includes("outstanding")) &&
    (q.includes("sales") || q.includes("sale") || q.includes("purchase") || q.includes("invoice"));

  if (isInvoiceIntent) {
    const byValue = q.includes("highest value") || q.includes("highest amount") || q.includes("most valuable") || q.includes("largest value") || q.includes("ordered by value") || q.includes("by value") || q.includes("by amount");
    const isPurchase = q.includes("purchase");

    if (byValue) {
      return {
        type:"invoicetable",
        content:`Here are your overdue ${isPurchase ? "purchase" : "sales"} invoices, ordered by highest outstanding value.`,
        sortKey: "outstanding",
        cols: [
          { key:"inv",         label:"Invoice",  w:"28%" },
          { key:"customer",    label:"Customer", w:"42%" },
          { key:"outstanding", label:"Amount",   w:"30%" },
        ],
        action:{ label:`Overdue ${isPurchase ? "purchase" : "sales"} invoices`, time:`Today, ${getTime()}`, cta:"Open" },
      };
    } else {
      return {
        type:"invoicetable",
        content:`Here are your overdue ${isPurchase ? "purchase" : "sales"} invoices, ordered by most overdue.`,
        sortKey: "daysOver",
        cols: [
          { key:"inv",      label:"Invoice",       w:"28%" },
          { key:"customer", label:"Customer",      w:"42%" },
          { key:"daysOver", label:"Days overdue",  w:"30%" },
        ],
        action:{ label:`Overdue ${isPurchase ? "purchase" : "sales"} invoices`, time:`Today, ${getTime()}`, cta:"Open" },
      };
    }
  }

  // ── Cash flow → line chart ─────────────────────────────────────────────────
  if (q.includes("cash flow") || q.includes("6 months") || q.includes("cashflow"))
    return { type:"linechart", intro:"Here's your cash flow for the last 6 months." };

  // ── Sales performance vs previous year → saleschart ───────────────────────
  if (q.includes("sales performance") || (q.includes("previous year") && (q.includes("sales") || q.includes("performance"))) || (q.includes("compared to") && q.includes("year") && q.includes("sales")))
    return { type:"saleschart", intro:"Here's your sales performance compared to the previous year." };

  // ── Revenue vs target → column chart ──────────────────────────────────────
  if (q.includes("revenue") || q.includes("compare") || q.includes("last year") || q.includes("previous year") || q.includes("prior year") || q.includes("sales trend"))
    return { type:"columnchart", intro:"Here's your revenue this fiscal month compared to the same month last year." };

  // ── Expenses → row chart ───────────────────────────────────────────────────
  if (q.includes("expense") || q.includes("spending") || q.includes("top expense"))
    return { type:"rowchart", intro:"Here's your top expenses for this period." };

  // ── Customer owing most → plain text ──────────────────────────────────────
  const wantsTopCustomer =
    (q.includes("most") && (q.includes("owe") || q.includes("owes") || q.includes("money") || q.includes("debt"))) ||
    q.includes("who owes") || q.includes("largest") || q.includes("biggest customer") || q.includes("owes the most");
  if (wantsTopCustomer)
    return { type:"text", content:"Hartley & Sons currently owes the most, with a total outstanding balance of 8.310,00 € across 3 invoices — the oldest of which is 53 days overdue." };

  // ── Generic invoice browse ─────────────────────────────────────────────────
  if (q.includes("invoice") || q.includes("owe") || q.includes("customer"))
    return {
      type:"invoicetable",
      content:"Here are your overdue sales invoices, ordered by most overdue.",
      sortKey:"daysOver",
      cols:[
        { key:"inv",      label:"Invoice",       w:"28%" },
        { key:"customer", label:"Customer",      w:"42%" },
        { key:"daysOver", label:"Days overdue",  w:"30%" },
      ],
      action:{ label:"Overdue sales invoices", time:`Today, ${getTime()}`, cta:"Open" },
    };

  return { type:"text", content:"I can show your cash flow, revenue vs last year, top expenses, or overdue invoices — just ask." };
}

            <rect x="4" y="4" width="2" height="2" rx="0.5" fill={iconColSub}/>
            <rect x="8" y="4" width="2" height="2" rx="0.5" fill={iconColSub}/>
            <rect x="12" y="4" width="2" height="2" rx="0.5" fill={iconColSub}/>
            <rect x="16" y="4" width="2" height="2" rx="0.5" fill={iconColSub}/>
            <rect x="4" y="8" width="2" height="2" rx="0.5" fill={iconColSub}/>
            <rect x="8" y="8" width="2" height="2" rx="0.5" fill={iconColSub}/>
            <rect x="12" y="8" width="2" height="2" rx="0.5" fill={iconColSub}/>
            <rect x="16" y="8" width="2" height="2" rx="0.5" fill={iconColSub}/>
            <rect x="6" y="12" width="10" height="2" rx="1" fill={iconColSub}/>

// ─── Input Bar ────────────────────────────────────────────────────────────────
// Mic flow: idle → recording (SR continuous + interimResults drives bar animation) →
//   user taps tick → transcribing (800ms) → idle with transcript in text field
// Cancel at any stage tears down stream, AudioContext, animation frame cleanly.
function InputBar({ value, onChange, onSend, onFocusInput, onBlurInput, keyboardOpen }) {
  const [micState, setMicState] = useState("idle"); // "idle"|"recording"|"transcribing"
  const [elapsed,  setElapsed]  = useState(0);

  // Refs — none hold state that triggers re-render
  const textareaRef  = useRef(null);
  const canvasRef    = useRef(null);   // waveform canvas — drawn directly via rAF, no React state
  const recRef       = useRef(null);   // SpeechRecognition instance — nulled on stop/abort to block onend restart
  const timerRef     = useRef(null);   // elapsed interval
  const animRef      = useRef(null);   // requestAnimationFrame id
  const analyserRef  = useRef(false);  // speaking activity flag: true when SR returns results
  const levelsRef    = useRef(Array(28).fill(3)); // bar heights — ref not state, avoids re-render

  // ── Sync textarea height whenever value changes (handles speech transcription) ─
  useEffect(() => {
    if (!textareaRef.current) return;
    if (!value) {
      textareaRef.current.style.height = "32px";
    } else {
      textareaRef.current.style.height = "auto";
      textareaRef.current.style.height = Math.min(textareaRef.current.scrollHeight, 132) + "px";
    }
  }, [value]);

  const confirmMicRef = useRef(null);

  // ── Elapsed timer ───────────────────────────────────────────────────────────
  useEffect(() => {
    if (micState === "recording") {
      setElapsed(0);
      timerRef.current = setInterval(() => setElapsed(e => {
        if (e >= 29) { confirmMicRef.current?.(); return 0; }
        return e + 1;
      }), 1000);
    } else {
      clearInterval(timerRef.current);
    }
    return () => clearInterval(timerRef.current);
  }, [micState]);

  const fmtT = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

  // ── Stop animation loop ─────────────────────────────────────────────────────
  const stopAnimation = () => {
    cancelAnimationFrame(animRef.current);
    animRef.current = null;
  };

  // ── Bar animation — draws directly to canvas, smooth lerp, no React re-renders ─
  const startBarAnimation = () => {
    stopAnimation();
    let phase = 0;
    const targets = Array(28).fill(3);
    const current = [...levelsRef.current];

    const tick = () => {
      phase += 0.12; // slightly slower phase for smoother wave
      const isSpeaking = analyserRef.current;

      // Compute new target heights
      for (let i = 0; i < 28; i++) {
        if (!isSpeaking) {
          targets[i] = 3 + Math.sin(phase + i * 0.45) * 2.5 + 1.5;
        } else {
          targets[i] = Math.abs(Math.sin(phase * 1.1 + i * 0.48)) * 28
                     + Math.abs(Math.sin(phase * 0.65 + i * 0.85)) * 10 + 4;
          targets[i] = Math.min(32, Math.max(4, targets[i]));
        }
        // Lerp current toward target — 0.18 = smooth, 0.35 = snappy
        const speed = isSpeaking ? 0.28 : 0.14;
        current[i] += (targets[i] - current[i]) * speed;
      }
      levelsRef.current = [...current];

      // Draw directly to canvas
      const canvas = canvasRef.current;
      if (canvas) {
        const dpr = window.devicePixelRatio || 1;
        const W = canvas.offsetWidth, H = 36;
        if (canvas.width !== W * dpr) {
          canvas.width = W * dpr;
          canvas.height = H * dpr;
          canvas.style.width = W + "px";
          canvas.style.height = H + "px";
        }
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.scale(dpr, dpr); // reset transform each frame
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        // Gradient left→right
        const grad = ctx.createLinearGradient(0, 0, W, 0);
        grad.addColorStop(0,    "#00d639");
        grad.addColorStop(0.5,  "#00d6de");
        grad.addColorStop(1.0,  "#9d60ff");
        ctx.fillStyle = grad;

        const barW = 4, gap = 3;
        const totalW = 28 * (barW + gap) - gap;
        const scaleX = W / totalW;

        for (let i = 0; i < 28; i++) {
          const h = Math.max(2, current[i]);
          const x = i * (barW + gap) * scaleX;
          const y = (H - h) / 2;
          const r = Math.min(2, h / 2);
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.lineTo(x + barW * scaleX - r, y);
          ctx.quadraticCurveTo(x + barW * scaleX, y, x + barW * scaleX, y + r);
          ctx.lineTo(x + barW * scaleX, y + h - r);
          ctx.quadraticCurveTo(x + barW * scaleX, y + h, x + barW * scaleX - r, y + h);
          ctx.lineTo(x + r, y + h);
          ctx.quadraticCurveTo(x, y + h, x, y + h - r);
          ctx.lineTo(x, y + r);
          ctx.quadraticCurveTo(x, y, x + r, y);
          ctx.closePath();
          ctx.fill();
        }
      }

      animRef.current = requestAnimationFrame(tick);
    };
    animRef.current = requestAnimationFrame(tick);
  };

  // ── Start mic ───────────────────────────────────────────────────────────────
  const startMic = () => {
    analyserRef.current = false; // speaking flag = false initially

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setMicState("recording");
      startBarAnimation();
      return;
    }

    const rec = new SR();
    rec.continuous     = true;
    rec.interimResults = true;
    rec.lang           = "en-GB";

    let hasStarted = false; // true only after onstart fires (permission granted)

    rec.onstart = () => {
      hasStarted = true;
      setMicState("recording");
      startBarAnimation();
    };

    rec.onresult = e => {
      // Any result means user is speaking — energise bars
      analyserRef.current = true;
      setTimeout(() => { analyserRef.current = false; }, 600);

      // Accumulate all final segments
      let text = "";
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) text += e.results[i][0].transcript + " ";
      }
      if (text.trim()) onChange(text.trim());
    };

    rec.onerror = e => {
      if (e.error === "no-speech") return; // non-fatal, keep listening
      if (e.error === "aborted")   return; // we triggered this, ignore
      // Permission denied or any other fatal error — reset cleanly, no restart
      recRef.current = null;
      stopAnimation();
      setMicState("idle");
    };

    rec.onend = () => {
      // Only auto-restart if: (a) permission was already granted (hasStarted),
      // and (b) user hasn't cancelled/confirmed (recRef still points to this rec)
      if (hasStarted && recRef.current === rec) {
        try { rec.start(); } catch {}
      }
    };

    recRef.current = rec;
    try { rec.start(); } catch { setMicState("idle"); }
  };

  // ── Confirm (tick) — stop SR, show transcribing, then go idle ──────────────
  const confirmMic = () => {
    const rec = recRef.current;
    recRef.current = null; // nulled BEFORE stop so onend doesn't restart
    if (rec) { try { rec.stop(); } catch {} }
    stopAnimation();
    analyserRef.current = false;
    levelsRef.current = Array(28).fill(3);
    setMicState("transcribing");
    setTimeout(() => {
      setMicState("idle");
    }, 800);
  };

  // ── Cancel — abort SR and reset everything ──────────────────────────────────
  const cancelMic = () => {
    const rec = recRef.current;
    recRef.current = null; // nulled BEFORE abort so onend doesn't restart
    if (rec) { try { rec.abort(); } catch {} }
    stopAnimation();
    analyserRef.current = false;
    levelsRef.current = Array(28).fill(3);
    // Clear canvas
    const canvas = canvasRef.current;
    if (canvas) { const ctx = canvas.getContext("2d"); ctx.clearRect(0, 0, canvas.width, canvas.height); }
    setMicState("idle");
    onChange("");
  };

  // Keep confirmMicRef current so the timer interval can call it without stale closure
  confirmMicRef.current = confirmMic;

  const handleSend = () => {
    if (value.trim()) { onSend(); setMicState("idle"); }
  };

  // ── Shared sub-components ───────────────────────────────────────────────────
  const Disclaimer = () => (
    <div style={{ padding:"5px 0 10px", fontSize:13, color:T.txtSubtle, lineHeight:1.5 }}>
      Check AI content for inaccuracies. This content is for information purposes and is not professional advice.{" "}
      <span style={{ color:T.actionBg, textDecoration:"underline", cursor:"pointer" }}>Privacy notice</span>
    </div>
  );
  const CancelCircle = ({ onClick }) => (
    <button onClick={onClick} style={{ width:38, height:38, borderRadius:"50%", background:"none", border:`1.5px solid ${T.borderDefault}`, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1L11 11M11 1L1 11" stroke={T.txtDefault} strokeWidth="1.8" strokeLinecap="round"/></svg>
    </button>
  );
  const ConfirmCircle = ({ onClick }) => (
    <button onClick={onClick} style={{ width:38, height:38, borderRadius:"50%", background:T.actionBg, border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M1 6L6 11L15 1" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
    </button>
  );
  // Sage DS microphone icon — matches annotated spec (24×24 viewport)
  const MicIcon = () => (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 1C10.3431 1 9 2.34315 9 4V12C9 13.6569 10.3431 15 12 15C13.6569 15 15 13.6569 15 12V4C15 2.34315 13.6569 1 12 1Z" fill={T.isDark?"#ffffff":T.txtSubtle}/>
      <path d="M6 10C6 9.44772 5.55228 9 5 9C4.44772 9 4 9.44772 4 10C4 14.0796 6.92027 17.446 10.75 17.9381V20H9C8.44772 20 8 20.4477 8 21C8 21.5523 8.44772 22 9 22H15C15.5523 22 16 21.5523 16 21C16 20.4477 15.5523 20 15 20H13.25V17.9381C17.0797 17.446 20 14.0796 20 10C20 9.44772 19.5523 9 19 9C18.4477 9 18 9.44772 18 10C18 13.3137 15.3137 16 12 16C8.68629 16 6 13.3137 6 10Z" fill={T.isDark?"#ffffff":T.txtSubtle}/>
    </svg>
  );

  // ── Waveform canvas — rAF draws directly into it, zero React re-renders ───────
  const WaveformCanvas = () => (
    <div style={{ flex:1, overflow:"hidden", height:36, padding:"0 4px", display:"flex", alignItems:"center" }}>
      <canvas ref={canvasRef} style={{ width:"100%", height:36, display:"block" }}/>
    </div>
  );

  // ── RECORDING ──────────────────────────────────────────────────────────────
  if (micState === "recording") return (
    <div style={{ padding:"8px 16px 0", background:T.bgSurface, borderTop:`1px solid ${T.borderSubtle}`, flexShrink:0 }}>
      <div style={{ display:"flex", alignItems:"center", gap:8, background:T.isDark?"#000000":"#ffffff", borderRadius:8, border:`1px solid ${T.isDark?"#a3adb5":"#75838f"}`, padding:"8px", height:48 }}>
        <CancelCircle onClick={cancelMic}/>
        <WaveformCanvas/>
        <span style={{ fontSize:13, color:T.isDark?"#ffffff":T.txtSubtle, flexShrink:0, paddingRight:4, whiteSpace:"nowrap" }}>{fmtT(elapsed)}/0:30</span>
        <ConfirmCircle onClick={confirmMic}/>
      </div>
    </div>
  );

  // ── TRANSCRIBING ───────────────────────────────────────────────────────────
  if (micState === "transcribing") return (
    <div style={{ padding:"8px 16px 0", background:T.bgSurface, borderTop:`1px solid ${T.borderSubtle}`, flexShrink:0 }}>
      <div style={{ display:"flex", alignItems:"center", gap:8, background:T.isDark?"#000000":"#ffffff", borderRadius:8, border:`1px solid ${T.isDark?"#a3adb5":"#75838f"}`, padding:"8px", height:48 }}>
        <CancelCircle onClick={cancelMic}/>
        <span style={{ flex:1, fontSize:14, color:T.isDark?"rgba(255,255,255,0.4)":T.txtFaint, paddingLeft:4 }}>Transcribing...</span>
        <ConfirmCircle onClick={() => {}}/>
      </div>
    </div>
  );

  // ── IDLE ───────────────────────────────────────────────────────────────────
  const hasText = value.trim().length > 0;
  return (
    <div style={{ padding:"8px 16px 0", background:T.bgSurface, borderTop:`1px solid ${T.borderSubtle}`, flexShrink:0 }}>
      <div style={{ display:"flex", alignItems:"flex-end", background:T.isDark?"#000000":"#ffffff", borderRadius:8, border:`1px solid ${T.isDark?"#a3adb5":"#75838f"}`, padding:"8px", minHeight:48, gap:8 }}>
        <textarea
          ref={textareaRef}
          placeholder="Ask Copilot a question"
          value={value}
          rows={1}
          autoCapitalize="sentences"
          onChange={e => {
            let v = e.target.value;
            // Auto-capitalise first character
            if (v.length === 1 && v === v.toLowerCase()) v = v.toUpperCase();
            onChange(v);
            // Auto-grow
            e.target.style.height = "auto";
            e.target.style.height = Math.min(e.target.scrollHeight, 132) + "px";
          }}
          onFocus={onFocusInput}
          onBlur={(e) => {
            const related = e.relatedTarget;
            const inpArea = document.getElementById("inp-area");
            const kbArea  = document.getElementById("kb-area");
            const staysInside = (inpArea && inpArea.contains(related)) || (kbArea && kbArea.contains(related));
            if (!staysInside) { setTimeout(() => onBlurInput(), 150); }
          }}
          onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
          style={{
            flex: 1,
            background: "none",
            border: "none",
            outline: "none",
            fontSize: 14,
            color: T.txtDefault,
            fontFamily: "Roboto, sans-serif",
            resize: "none",
            overflowY: "hidden",
            lineHeight: "20px",
            padding: "6px 8px",
            height: 32,
            boxSizing: "border-box",
            colorScheme: T.isDark ? "dark" : "light",
          }}
        />
        {hasText
          ? <button onClick={handleSend} style={{ background:T.actionBg, border:"none", borderRadius:"50%", width:32, height:32, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3.4 2.008L21.4 10.808C22.2 11.208 22.2 12.808 21.4 13.208L3.4 22.008C2.5 22.408 1.6 21.608 1.9 20.708L4.5 13.508C4.7 13.008 5.1 12.608 5.7 12.508L14.5 12.008L5.7 11.508C5.1 11.408 4.7 11.008 4.5 10.508L1.9 3.308C1.6 2.408 2.5 1.608 3.4 2.008Z" fill={T.actionLbl}/></svg>
            </button>
          : <button
              onClick={startMic}
              style={{ background:"none", border:"none", padding:0, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, width:32, height:32 }}>
              <MicIcon/>
            </button>
        }
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function SageCopilot() {
  const [isDark,          setIsDark]          = useState(false);
  const [screen,          setScreen]          = useState("entry");
  const [messages,        setMessages]        = useState([]);
  const [input,           setInput]           = useState("");
  const [isAnalysing,     setIsAnalysing]     = useState(false);
  const [analysingQuery,  setAnalysingQuery]  = useState("");
  const [sheetMsg,        setSheetMsg]        = useState(null);
  const [showGetStarted,  setShowGetStarted]  = useState(false);
  const [showClearDlg,    setShowClearDlg]    = useState(false);
  const [keyboardVisible, setKeyboardVisible] = useState(false);

  // Keep global T in sync with theme state — all child components read T at render time
  T = isDark ? THEMES.dark : THEMES.light;

  const toggleTheme = () => setIsDark(d => !d);
  const scrollRef      = useRef(null);
  const newMsgRef      = useRef(null);
  const [showScrollBtn, setShowScrollBtn] = useState(false);
  const [scrollBtnVisible, setScrollBtnVisible] = useState(false);
  const scrollHideTimer = useRef(null);
  const latestUserMsgId = useRef(null);

  const pendingScrollTop = useRef(false);

  const queueScrollToNewMsg = () => {
    pendingScrollTop.current = true;
  };

  // ── Scroll new user bubble to top of container (the Claude pattern) ─────────
  // On every user message: scroll so that bubble sits at the top of the visible
  // chat area. We use getBoundingClientRect delta so positioning is always
  // relative to the container's current viewport — no offsetParent chain needed.

  useLayoutEffect(() => {
    if (!pendingScrollTop.current) return;
    pendingScrollTop.current = false;
    const container = scrollRef.current;
    const bubble    = newMsgRef.current;
    if (!container || !bubble) return;
    // Distance from container's top edge to bubble's top edge
    const containerTop = container.getBoundingClientRect().top;
    const bubbleTop    = bubble.getBoundingClientRect().top;
    const delta = bubbleTop - containerTop;
    // New scrollTop = current + delta - small top padding
    container.scrollTop = container.scrollTop + delta - 14;
  });

  // Smooth scroll to bottom for assistant responses and analysing state
  const scrollToBottom = (smooth = true) => {
    if (!scrollRef.current) return;
    scrollRef.current.scrollTo({
      top: scrollRef.current.scrollHeight,
      behavior: smooth ? "smooth" : "auto",
    });
  };

  useEffect(() => {
    if (!scrollRef.current) return;
    const lastMsg = messages[messages.length - 1];
    if (!lastMsg || lastMsg.role === "user") return;
    // Assistant message arrived — scroll to bottom
    scrollToBottom();
  }, [messages]);

  useEffect(() => {
    if (isAnalysing) scrollToBottom();
  }, [isAnalysing]);

  // Show/hide scroll-to-bottom button based on scroll position
  const handleChatScroll = () => {
    if (!scrollRef.current) return;
    const { scrollTop, scrollHeight, clientHeight } = scrollRef.current;
    const shouldShow = scrollHeight > clientHeight && scrollHeight - scrollTop - clientHeight > 120;
    if (shouldShow) {
      clearTimeout(scrollHideTimer.current);
      setShowScrollBtn(true);
      setScrollBtnVisible(true);
    } else if (showScrollBtn) {
      // Trigger exit animation, then unmount after it completes
      setScrollBtnVisible(false);
      scrollHideTimer.current = setTimeout(() => setShowScrollBtn(false), 220);
    }
  };

  const sendMessage = (text) => {
    const trimmed = (text || input).trim();
    if (!trimmed) return;
    setScreen("chat");
    // Queue the "scroll new bubble to top" — executes in useLayoutEffect after render
    queueScrollToNewMsg();
    // Add user bubble
    setMessages(prev => [...prev, { id:Date.now(), role:"user", type:"text", content:trimmed, time:getTime(), date:new Date().toISOString().slice(0,10) }]);
    setInput("");
    setKeyboardVisible(false);
    const analyseDelay = setTimeout(() => {
      setAnalysingQuery(trimmed);
      setIsAnalysing(true);
    }, 200);
    const totalDelay = 1200 + Math.random() * 600;
    setTimeout(() => {
      clearTimeout(analyseDelay);
      const resp = getAIResponse(trimmed);
      const nm   = { id:Date.now()+1, role:"assistant", time:getTime(), date:new Date().toISOString().slice(0,10), ...resp };
      setIsAnalysing(false);
      setAnalysingQuery("");
      setMessages(prev => [...prev, nm]);
      if (["linechart","columnchart","rowchart","saleschart"].includes(resp.type)) {
        setTimeout(() => setSheetMsg(nm), 280);
      }
    }, totalDelay);
  };

  // ── Save invoice — show loading, then confirmation bubble ──────────────────
  const handleSaveInvoice = (previewMsg) => {
    // Show analysing state
    setAnalysingQuery("Saving invoice");
    setIsAnalysing(true);
    const saveDelay = 800 + Math.random() * 400;
    setTimeout(() => {
      setIsAnalysing(false);
      setAnalysingQuery("");
      const confirmMsg = {
        id: Date.now() + 2,
        role: "assistant",
        type: "invoiceconfirm",
        content: "Your sales invoice has been created and saved.",
        invoice: previewMsg.invoice,
        time: getTime(),
        date: new Date().toISOString().slice(0, 10),
      };
      setMessages(prev => [...prev, confirmMsg]);

        @keyframes starPulse { 0%,100%{opacity:0.2;transform:translate(-50%,-50%) scale(0.6)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.2)} }
        @keyframes scrollBtnIn  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        @keyframes scrollBtnOut { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(8px)} }
        @keyframes analyseStepIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
        * { box-sizing:border-box; }
        input, button { font-family:'Roboto',sans-serif; }
        ::-webkit-scrollbar { display:none; }
        * { scrollbar-width:none; }
        .chat-scroll { overflow-y: auto !important; scrollbar-gutter: auto !important; -ms-overflow-style:none; }
        button:active { opacity:0.76; }
        textarea::placeholder { color: ${T.isDark ? "rgba(255,255,255,0.35)" : "#a3adb5"}; opacity: 1; font-size: 14px; font-family: Roboto, sans-serif; }
        textarea::-webkit-input-placeholder { color: ${T.isDark ? "rgba(255,255,255,0.35)" : "#a3adb5"}; opacity: 1; }
      `}</style>

      <div style={{ width:412, height:917, overflow:"hidden", borderRadius:44, background:T.bgPage, display:"flex", flexDirection:"column", position:"relative", isolation:"isolate", boxShadow:"0 40px 80px rgba(0,0,0,0.7), 0 0 0 10px #1a1a1a, 0 0 0 12px #333", transition:"background 0.3s" }}>
        {/* Notch */}
        <div style={{ position:"absolute", top:0, left:"50%", transform:"translateX(-50%)", width:120, height:30, background:T.navBg, borderRadius:"0 0 20px 20px", zIndex:50 }}/>

        <StatusBar/>

        {/* Header — navBg always black, excluded from theme switching */}
        <div style={{ height:56, background:T.navBg, display:"flex", alignItems:"center", padding:"0 4px 0 14px", gap:8, flexShrink:0, zIndex:10 }}>
          <CopilotLogo size={26} uid="hdr"/>
          <span style={{ flex:1, color:T.navTxt, fontSize:15, fontWeight:500, letterSpacing:"0.01em" }}>Sage Copilot</span>
          {/* Dark mode toggle — sun/moon icons with pill switch */}
          <button onClick={toggleTheme} aria-label="Toggle dark mode"
            style={{ background:"none", border:"none", cursor:"pointer", padding:"6px 8px", display:"flex", alignItems:"center", gap:5 }}>
            {/* Track */}
            <div style={{ position:"relative", width:36, height:20, borderRadius:10, background: isDark ? "rgba(255,255,255,0.18)" : "rgba(255,255,255,0.22)", transition:"background 0.3s", flexShrink:0 }}>
              {/* Knob */}
              <div style={{ position:"absolute", top:2, left: isDark ? 18 : 2, width:16, height:16, borderRadius:"50%", background:"#ffffff", transition:"left 0.25s cubic-bezier(0.34,1.56,0.64,1)", display:"flex", alignItems:"center", justifyContent:"center", boxShadow:"0 1px 3px rgba(0,0,0,0.4)" }}>
                {isDark
                  ? <svg width="9" height="9" viewBox="0 0 12 12" fill="none"><path d="M10.5 7.5A5 5 0 0 1 4.5 1.5a5 5 0 1 0 6 6z" fill="#1a1a1a"/></svg>
                  : <svg width="9" height="9" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="2.5" fill="#f5a623"/><line x1="6" y1="0.5" x2="6" y2="2" stroke="#f5a623" strokeWidth="1.2" strokeLinecap="round"/><line x1="6" y1="10" x2="6" y2="11.5" stroke="#f5a623" strokeWidth="1.2" strokeLinecap="round"/><line x1="0.5" y1="6" x2="2" y2="6" stroke="#f5a623" strokeWidth="1.2" strokeLinecap="round"/><line x1="10" y1="6" x2="11.5" y2="6" stroke="#f5a623" strokeWidth="1.2" strokeLinecap="round"/></svg>
                }
              </div>
            </div>
          </button>
          <ThreeDotMenu onClearChat={() => setShowClearDlg(true)} onGetStarted={() => setShowGetStarted(true)}/>
          <button onClick={() => { setScreen("entry"); setMessages([]); setInput(""); setKeyboardVisible(false); setIsAnalysing(false); setAnalysingQuery(""); }}
            style={{ background:"none", border:"none", cursor:"pointer", padding:"8px 10px", display:"flex" }}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 1L15 15M15 1L1 15" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>
          </button>
        </div>

        {/* Body */}
        <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", position:"relative" }}>
          {screen === "entry"
            ? (
              <div onClick={e => e.stopPropagation()} style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
                <EntryPoint
                  onGetStarted={() => setShowGetStarted(true)}
                  onSelectPrompt={(p) => sendMessage(p)}
                />
              </div>
            )
            : (
              <div style={{ flex:1, position:"relative", minHeight:0, display:"flex", flexDirection:"column" }}>
                <div ref={scrollRef} className="chat-scroll" onClick={e => e.stopPropagation()} onScroll={handleChatScroll} style={{ flex:1, overflowY:"auto", padding:"14px 14px 0 14px", display:"flex", flexDirection:"column" }}>
                  {(() => {
                    const latestUserId = [...messages].reverse().find(m => m.role === "user")?.id;
                    return insertDayStamps(messages).map(item =>
                      item._type === "daystamp"
                        ? <DayStamp key={item._key} dateStr={item.dateStr}/>
                        : <MessageBubble key={item.id} msg={item} onOpenSheet={setSheetMsg} onSend={sendMessage} onSaveInvoice={handleSaveInvoice} bubbleRef={item.id === latestUserId ? newMsgRef : null}/>
                    );
                  })()}
                  {/* Loading state — animated logo + "Analysing request..." */}
                  {isAnalysing && <AnalysingState query={analysingQuery}/>}
                </div>
                {/* Scroll-to-bottom FAB — bottom-right, 16px margin, ease-out exit */}
                {showScrollBtn && (
                  <div style={{
                    position: "absolute",
                    bottom: 16,
                    right: 16,
                    zIndex: 50,
                    animation: scrollBtnVisible ? "scrollBtnIn 0.18s ease-out" : "scrollBtnOut 0.2s ease-out forwards",
                    pointerEvents: "auto",
                  }}>
                    <button
                      onClick={scrollToBottom}
                      style={{
                        width: 40,
                        height: 40,
                        borderRadius: "50%",
                        background: T.bgSurface,
                        border: `2px solid ${T.btnSecBorder}`,
                        boxShadow: "0 4px 16px rgba(0,0,0,0.18), 0 1px 4px rgba(0,0,0,0.08)",
                        cursor: "pointer",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        padding: 0,
                      }}
                    >
                      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                        <path d="M10 4V16M10 16L5 11M10 16L15 11" stroke={T.txtDefault} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    </button>
                  </div>
                )}
                {/* Bottom fade — subtle white gradient to mask content edge */}
                <div style={{
                  position: "absolute",
                  bottom: 0,
                  left: 0,
                  right: 0,
                  height: 8,
                  background: T.isDark ? "linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 100%)" : "linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 100%)",
                  pointerEvents: "none",
                  zIndex: 10,
                }}/>
              </div>
            )
          }

          {/* Input + Disclaimer + Keyboard dock — input and keyboard are rigid, disclaimer collapses between them */}
          <div onClick={e => e.stopPropagation()} style={{ flexShrink:0, background:T.bgSurface }}>
            <div id="inp-area" style={{ paddingBottom: keyboardVisible ? 8 : 0 }}>
              <InputBar value={input} onChange={setInput} onSend={() => sendMessage(input)} onFocusInput={handleFocusInput} onBlurInput={() => setKeyboardVisible(false)} keyboardOpen={keyboardVisible}/>
            </div>
            {/* Disclaimer — below input, collapses to 0 when keyboard opens */}
            <div style={{
              padding: "0 24px",
              textAlign: "center",
              overflow: "hidden",
              maxHeight: keyboardVisible ? 0 : "120px",
              opacity: keyboardVisible ? 0 : 1,
              transition: keyboardVisible
                ? "max-height 0.12s ease, opacity 0.08s ease"
                : "max-height 0.25s ease 0.22s, opacity 0.22s ease 0.28s",
            }}>
              <div style={{ padding:"8px 0 16px", fontSize:13, color:T.txtSubtle, lineHeight:1.55 }}>
                Check AI content for inaccuracies.{" "}
                <span style={{ color:T.actionBg, textDecoration:"underline", cursor:"pointer" }}>Privacy notice</span>
              </div>
            </div>
            <div
              id="kb-area"
              style={{
                overflow: "hidden",
                maxHeight: keyboardVisible ? "400px" : "0px",
                transition: "max-height 0.28s cubic-bezier(0.32,0.72,0,1)",
              }}
            >
              <AndroidKeyboard onDismiss={() => setKeyboardVisible(false)}/>
            </div>
          </div>
        </div>

        {/* Overlays */}
        {sheetMsg && sheetMsg.type !== "invoicetable" && <ChartSheet msg={sheetMsg} onClose={() => setSheetMsg(null)}/>}
        {sheetMsg && sheetMsg.type === "invoicetable" && <InvoiceSheet onClose={() => setSheetMsg(null)}/>}
        {showGetStarted && <GetStartedSheet onClose={() => setShowGetStarted(false)} onPrompt={p => { setScreen("chat"); sendMessage(p); }}/>}
        {showClearDlg   && (
          <ConfirmDialog
            title="Clear chat"
            message="Are you sure you want to clear your chat history? This cannot be undone."
            confirmLabel="Clear chat"
            cancelLabel="Keep"
            onConfirm={handleClearConfirm}
            onCancel={() => setShowClearDlg(false)}
          />
        )}
      </div>
    </div>
  );
}

// ── Mount ─────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SageCopilot />);
</script>
</body>
</html>
